<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 — Pagina nu a fost gasita | TEHNOFASAD</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; margin: 0; }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: Inter, Arial, sans-serif;
        color: #fff;
        background: #101820;
        text-align: center;
        padding: 24px;
      }
      .code {
        font-size: clamp(5rem, 15vw, 10rem);
        font-weight: 800;
        line-height: 1;
        background: linear-gradient(135deg, #df2f2f 0%, #b92525 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      h1 {
        margin: 18px 0 12px;
        font-size: 1.4rem;
        font-weight: 700;
      }
      p {
        max-width: 420px;
        margin-bottom: 28px;
        color: rgba(255,255,255,0.68);
        line-height: 1.6;
      }
      a {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 6px;
        padding: 0 26px;
        color: #fff;
        background: #df2f2f;
        font-weight: 800;
        text-decoration: none;
        text-transform: uppercase;
        transition: background-color 160ms ease, transform 160ms ease;
      }
      a:hover { background: #b92525; transform: translateY(-1px); }
    </style>
  </head>
  <body>
    <div class="code">404</div>
    <h1>Pagina nu a fost gasita</h1>
    <p>Pagina pe care o cautati nu exista sau a fost mutata. Reveniti la pagina principala.</p>
    <a href="/">Pagina principala</a>
  </body>
</html>
